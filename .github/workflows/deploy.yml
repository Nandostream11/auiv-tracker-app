name: Deploy Backend to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Render owner ID
        id: owner
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          OWNER_ID=$(curl -s "https://api.render.com/v1/owners?limit=1" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" | \
            python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['owner']['id'])")
          echo "owner_id=$OWNER_ID" >> $GITHUB_OUTPUT
          echo "Owner: $OWNER_ID"

      - name: Check if service exists
        id: check_service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          SERVICES=$(curl -s "https://api.render.com/v1/services?limit=20" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json")
          SERVICE_ID=$(echo "$SERVICES" | python3 -c "
          import sys,json
          data=json.load(sys.stdin)
          for item in data:
            if item.get('service',{}).get('name') == 'auiv-tracker-api':
              print(item['service']['id'])
              break
          " 2>/dev/null || echo "")
          SERVICE_URL=$(echo "$SERVICES" | python3 -c "
          import sys,json
          data=json.load(sys.stdin)
          for item in data:
            if item.get('service',{}).get('name') == 'auiv-tracker-api':
              print(item['service'].get('serviceDetails',{}).get('url',''))
              break
          " 2>/dev/null || echo "")
          echo "service_id=$SERVICE_ID"   >> $GITHUB_OUTPUT
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Service ID:  $SERVICE_ID"
          echo "Service URL: $SERVICE_URL"

      - name: Create Render service (first time only)
        id: create_service
        if: steps.check_service.outputs.service_id == ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: |
          OWNER_ID="${{ steps.owner.outputs.owner_id }}"
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{
              \"type\": \"web_service\",
              \"name\": \"auiv-tracker-api\",
              \"ownerId\": \"$OWNER_ID\",
              \"serviceDetails\": {
                \"env\": \"python\",
                \"buildCommand\": \"pip install -r requirements.txt\",
                \"startCommand\": \"uvicorn app.main:app --host 0.0.0.0 --port \$PORT\",
                \"rootDir\": \"backend\",
                \"healthCheckPath\": \"/health\",
                \"plan\": \"free\",
                \"region\": \"oregon\"
              },
              \"repo\": \"https://github.com/Nandostream11/auiv-tracker-app\",
              \"branch\": \"main\",
              \"autoDeploy\": \"yes\",
              \"envVars\": [
                {\"key\": \"MONGO_URL\",      \"value\": \"$MONGO_URL\"},
                {\"key\": \"DB_NAME\",        \"value\": \"auiv_tracker\"},
                {\"key\": \"PYTHON_VERSION\", \"value\": \"3.12.0\"}
              ]
            }")
          SERVICE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('service',{}).get('id',''))" 2>/dev/null || echo "")
          SERVICE_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('service',{}).get('serviceDetails',{}).get('url',''))" 2>/dev/null || echo "")
          echo "service_id=$SERVICE_ID"   >> $GITHUB_OUTPUT
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Created: $SERVICE_ID  URL: $SERVICE_URL"

      - name: Trigger redeploy (existing service)
        if: steps.check_service.outputs.service_id != ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          SERVICE_ID="${{ steps.check_service.outputs.service_id }}"
          curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'
          echo "Redeploy triggered"

      - name: Resolve final service URL
        id: resolve
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          # Always re-derive from the LIST endpoint — this is the shape that
          # is proven to parse correctly (single-service GET has a different
          # response shape that our earlier parser got wrong).
          SERVICES=$(curl -s "https://api.render.com/v1/services?limit=20" \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json")
          BACKEND_URL=$(echo "$SERVICES" | python3 -c "
          import sys,json
          data=json.load(sys.stdin)
          for item in data:
            if item.get('service',{}).get('name') == 'auiv-tracker-api':
              url = item['service'].get('serviceDetails',{}).get('url','')
              print(f'https://{url}' if url else '')
              break
          " 2>/dev/null || echo "")
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Resolved backend URL: $BACKEND_URL"

      - name: Wait for health check
        id: health
        run: |
          BACKEND_URL="${{ steps.resolve.outputs.backend_url }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "No backend URL resolved — cannot health check"
            exit 1
          fi
          echo "Polling $BACKEND_URL/health ..."
          for i in $(seq 1 25); do
            sleep 15
            HEALTH=$(curl -sf "$BACKEND_URL/health" 2>/dev/null || echo "starting")
            echo "[$i/25] $HEALTH"
            if echo "$HEALTH" | grep -q '"ok"'; then
              echo "Backend is healthy."
              exit 0
            fi
          done
          echo "Health check did not pass in time (deploy may still be finishing on Render's side)"
          exit 0   # don't fail the whole workflow just because health check is slow

      - name: Write deploy info
        if: always()
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          BACKEND_URL="${{ steps.resolve.outputs.backend_url }}"
          SERVICE_ID="${{ steps.check_service.outputs.service_id }}"
          [ -z "$SERVICE_ID" ] && SERVICE_ID="${{ steps.create_service.outputs.service_id }}"

          DEPLOYS=$(curl -s "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=1" \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json")
          DEPLOY_STATUS=$(echo "$DEPLOYS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d: print(d[0].get('deploy',{}).get('status','unknown'))
          " 2>/dev/null || echo "unknown")

          mkdir -p deploy_output
          cat > deploy_output/backend_url.txt << EOF2
          BACKEND_URL=${BACKEND_URL}
          HEALTH_URL=${BACKEND_URL}/health
          DOCS_URL=${BACKEND_URL}/docs
          DEPLOY_STATUS=${DEPLOY_STATUS}
          SERVICE_ID=${SERVICE_ID}
          EOF2

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## AUIV Tracker Backend Deploy

          | Field | Value |
          |---|---|
          | Backend URL | ${BACKEND_URL} |
          | Health | ${BACKEND_URL}/health |
          | API Docs | ${BACKEND_URL}/docs |
          | Deploy Status | ${DEPLOY_STATUS} |
          | Service ID | ${SERVICE_ID} |
          EOF

          echo "================================================"
          cat deploy_output/backend_url.txt
          echo "================================================"

      - name: Upload deploy info as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-url
          path: deploy_output/backend_url.txt
          retention-days: 7

      - name: Commit URL to repo file
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          mkdir -p .deploy
          cp deploy_output/backend_url.txt .deploy/backend_url.txt
          echo "Last updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .deploy/backend_url.txt

          git add .deploy/backend_url.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "deploy: record live backend URL [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main || \
            echo "Push failed — GITHUB_TOKEN may lack write permission. URL is still in the artifact and step summary above."
